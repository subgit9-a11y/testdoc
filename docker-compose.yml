services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: aibackend

    restart: always

    ports:
      - "5001:5000"

    env_file:
      - .env

    volumes:
      - ./logs/backend:/app/logs

    environment:
      ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 5000
      PYTHONUNBUFFERED: 1
      FIREBASE_SERVICE_ACCOUNT: /app/firebase-service-account.json

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:latest

    container_name: aibackend_proxy

    restart: always

    depends_on:
      - backend

    volumes:
      - ./logs/nginx:/var/log/nginx

    ports:
      - "8080:80"
      - "8443:443"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
