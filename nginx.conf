events {}

http {
    # -------------------------------------------------------------
    # WAF: Limit Request Zone
    # Defines a shared memory zone for rate limiting per IP address.
    # 10m holds ~160k states. 10 requests per second rate.
    # -------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;

        # -------------------------------------------------------------
        # WAF: Security Headers
        # -------------------------------------------------------------
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # -------------------------------------------------------------
        # WAF: Block Bad Bots & Vulnerability Scanners
        # -------------------------------------------------------------
        if ($http_user_agent ~* (nikto|sqlmap|nmap|zgrab|masscan)) {
            return 403;
        }

        # -------------------------------------------------------------
        # WAF: Block SQL Injection & XSS Patterns (Regex)
        # -------------------------------------------------------------
        set $block_sql_xss 0;
        if ($request_uri ~* "(union.*select|drop.*table|insert.*into|--|javascript:|alert\()") {
            set $block_sql_xss 1;
        }
        if ($query_string ~* "(union.*select|drop.*table|insert.*into|--|javascript:|alert\()") {
            set $block_sql_xss 1;
        }
        if ($block_sql_xss = 1) {
            return 403;
        }
        
        # -------------------------------------------------------------
        # WAF: Block Uncommon HTTP Methods
        # -------------------------------------------------------------
        if ($request_method !~ ^(GET|POST|OPTIONS|PUT|DELETE|PATCH)$ ) {
            return 405;
        }

        # -------------------------------------------------------------
        # WEBHOOK PAYLOAD TRUNCATION FIX (Issue #42)
        # Prevents 413 Entity Too Large errors on massive Shopify orders
        # -------------------------------------------------------------
        location /api/v1/payments {
            proxy_pass http://aibackend:5000;
            
            # Allow massive webhook JSON payloads (up to 50MB)
            client_max_body_size 50M;

            # Allow bursts for webhooks without delaying them
            limit_req zone=api_limit burst=20 nodelay;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default Catch-All
        location / {
            proxy_pass http://aibackend:5000;

            # Default security limit for normal API traffic
            client_max_body_size 2M;

            # Apply rate limiting to normal API endpoints
            limit_req zone=api_limit burst=10 nodelay;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
